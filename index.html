<!-- index.html -->

<!DOCTYPE html>
<html>

<head>
    <title>AI Gym Trainer</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        video {
            border-radius: 20px;
            margin-top: 20px;
        }

        button {
            padding: 15px 25px;
            font-size: 20px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #feedback {
            margin-top: 20px;
            font-size: 22px;
            color: #00ff88;
        }

        #countdown {
            font-size: 80px;
            color: yellow;
        }

        #phase {
            font-size: 40px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1>🏋️ AI Gym Trainer</h1>

    <video id="video" autoplay width="700"></video>

    <canvas id="canvas" style="display:none;"></canvas>

    <div>
        <button onclick="startWorkout()">Start</button>

        <button onclick="pauseWorkout()">Pause</button>

        <button onclick="resumeWorkout()">Resume</button>
    </div>

    <h1 id="countdown"></h1>

    <h2 id="phase">Idle</h2>

    <h2 id="exercise">Exercise: --</h2>

    <h2 id="angle">Angle: --</h2>

    <h2 id="counter">Reps: 0</h2>

    <div id="feedback"></div>

    <script>

        const video = document.getElementById("video");

        const canvas = document.getElementById("canvas");

        const ctx = canvas.getContext("2d");

        let intervalId;

        // =========================
        // START CAMERA
        // =========================
        async function startCamera() {

            const stream =
                await navigator.mediaDevices.getUserMedia({
                    video: true
                });

            video.srcObject = stream;
        }

        startCamera();

        // =========================
        // START WORKOUT
        // =========================
        async function startWorkout() {

            await fetch("https://gym-pose-corrector-1.onrender.com/start", {
                method: "POST"
            });

            let count = 3;

            document.getElementById("phase").innerText =
                "Get Ready";

            const countdown =
                setInterval(() => {

                    document.getElementById("countdown")
                        .innerText = count;

                    count--;

                    if (count < 0) {

                        clearInterval(countdown);

                        document.getElementById("countdown")
                            .innerText = "GO!";

                        startLoop();
                    }

                }, 1000);
        }

        // =========================
        // PAUSE
        // =========================
        async function pauseWorkout() {

            clearInterval(intervalId);

            await fetch("https://gym-pose-corrector-1.onrender.com/pause", {
                method: "POST"
            });

            document.getElementById("phase")
                .innerText = "Paused";
        }

        // =========================
        // RESUME
        // =========================
        async function resumeWorkout() {

            await fetch("https://gym-pose-corrector-1.onrender.com/resume", {
                method: "POST"
            });

            startLoop();
        }

        // =========================
        // START LOOP
        // =========================
        function startLoop() {

            clearInterval(intervalId);

            intervalId =
                setInterval(sendFrame, 300);
        }

        // =========================
        // SEND FRAME
        // =========================
        async function sendFrame() {

            canvas.width = video.videoWidth;

            canvas.height = video.videoHeight;

            ctx.drawImage(
                video,
                0,
                0
            );

            canvas.toBlob(async (blob) => {

                const formData = new FormData();

                formData.append(
                    "frame",
                    blob,
                    "frame.jpg"
                );

                const response =
                    await fetch(
                        "https://gym-pose-corrector-1.onrender.com/analyze",
                        {
                            method: "POST",
                            body: formData
                        }
                    );

                const data =
                    await response.json();

                // =========================
                // UPDATE UI
                // =========================
                document.getElementById("angle")
                    .innerText =
                    "Angle: " + data.angle;

                document.getElementById("counter")
                    .innerText =
                    "Reps: " + data.counter;

                document.getElementById("exercise")
                    .innerText =
                    "Exercise: " + data.exercise;

                document.getElementById("feedback")
                    .innerHTML =
                    data.feedback.join("<br>");

                // =========================
                // PHASES
                // =========================
                if (data.phase === "rest") {

                    document.getElementById("phase")
                        .innerText =
                        "Rest: " +
                        data.rest_remaining +
                        " sec";

                }

                else if (data.phase === "finished") {

                    document.getElementById("phase")
                        .innerText =
                        "Workout Finished 🎉";

                    clearInterval(intervalId);
                }

                else {

                    document.getElementById("phase")
                        .innerText =
                        "Training";
                }

            }, "image/jpeg");

        }

    </script>

</body>

</html>
